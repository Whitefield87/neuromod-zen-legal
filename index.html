    <title>Privacy & Zen - Neuromod</title>
    <style>
        :root {
            --bg-color: #0f172a;       /* Blu notte profondo */
            --card-bg: #1e293b;       /* Blu ardesia per il contenitore */

            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 90%;
            margin: 60px 20px;

            background: var(--card-bg);
            border-radius: 30px;

            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-weight: 200; 
            font-size: 2.5em;
            color: var(--accent-zen); 
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 10px;
        }

            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
